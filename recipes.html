<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Manager — My Recipes</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            min-height: 100vh;
        }

        nav {
            background: #2c3e50;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav h1 { color: white; font-size: 1.2rem; }

        nav a {
            color: #ccc;
            text-decoration: none;
            margin-left: 1rem;
            font-size: 0.9rem;
        }

        nav a:hover { color: white; }

        .container {
            max-width: 1100px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .search-bar input {
            padding: 0.6rem 1rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            width: 250px;
            font-size: 0.95rem;
        }

        .btn {
            padding: 0.6rem 1.2rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
        }

        .btn-green { background: #27ae60; color: white; }
        .btn-green:hover { background: #219a52; }
        .btn-red { background: #e74c3c; color: white; }
        .btn-red:hover { background: #c0392b; }
        .btn-blue { background: #2980b9; color: white; }
        .btn-blue:hover { background: #2471a3; }

        .tags-filter {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }

        .tag {
            padding: 0.3rem 0.8rem;
            background: #ecf0f1;
            border-radius: 20px;
            font-size: 0.85rem;
            cursor: pointer;
            border: 2px solid transparent;
        }

        .tag.active {
            background: #27ae60;
            color: white;
        }

        .recipes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .recipe-card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            overflow: hidden;
            transition: transform 0.2s;
        }

        .recipe-card:hover { transform: translateY(-3px); }

        .recipe-card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
        }

        .recipe-card .placeholder-img {
            width: 100%;
            height: 160px;
            background: #ecf0f1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }

        .card-body { padding: 1rem; }

        .card-body h3 {
            margin-bottom: 0.5rem;
            color: #2c3e50;
        }

        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem;
            margin-bottom: 0.75rem;
        }

        .card-tag {
            padding: 0.2rem 0.6rem;
            background: #eafaf1;
            color: #27ae60;
            border-radius: 20px;
            font-size: 0.75rem;
        }

        .card-actions {
            display: flex;
            gap: 0.5rem;
        }

        .card-actions a, .card-actions button {
            flex: 1;
            padding: 0.4rem;
            text-align: center;
            font-size: 0.85rem;
        }

        .empty-state {
            text-align: center;
            padding: 4rem;
            color: #888;
        }

        .empty-state p { margin-bottom: 1rem; font-size: 1.1rem; }
    </style>
</head>
<body>

<nav>
    <h1>🍴 Recipe Manager</h1>
    <div>
        <a href="recipes.html">My Recipes</a>
        <a href="recipe-form.html">+ New Recipe</a>
        <a href="#" onclick="logout()">Logout</a>
    </div>
</nav>

<div class="container">
    <div class="toolbar">
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search by ingredient..." oninput="searchRecipes()">
        </div>
        <a href="recipe-form.html" class="btn btn-green">+ New Recipe</a>
    </div>

    <div class="tags-filter" id="tagsFilter"></div>
    <div class="recipes-grid" id="recipesGrid"></div>
</div>

<script>
    const API = 'http://localhost/recipe-manager/backend/recipe.php';
    const AUTH = 'http://localhost/recipe-manager/backend/auth.php';

    // Get logged in user
    const user = JSON.parse(localStorage.getItem('user') || 'null');
    if (!user) window.location.href = 'login.html';

    let allRecipes = [];
    let activeTag = null;

    async function loadRecipes(ingredient = '') {
        let url = `${API}?user_id=${user.user_id}`;
        if (activeTag) url += `&tag=${activeTag}`;
        if (ingredient) url += `&ingredient=${ingredient}`;

        const res = await fetch(url);
        allRecipes = await res.json();

        renderRecipes(allRecipes);
        renderTags();
    }

    function renderRecipes(recipes) {
        const grid = document.getElementById('recipesGrid');

        if (!recipes.length) {
            grid.innerHTML = `
                <div class="empty-state" style="grid-column:1/-1">
                    <p>No recipes found.</p>
                    <a href="recipe-form.html" class="btn btn-green">Add your first recipe</a>
                </div>`;
            return;
        }

        grid.innerHTML = recipes.map(r => `
            <div class="recipe-card">
                ${r.image_path
                    ? `<img src="../uploads/${r.image_path}" alt="${r.title}">`
                    : `<div class="placeholder-img">🍽️</div>`}
                <div class="card-body">
                    <h3>${r.title}</h3>
                    <div class="card-tags">
                        ${(r.tags || []).map(t => `<span class="card-tag">${t}</span>`).join('')}
                    </div>
                    <div class="card-actions">
                        <a href="recipe-detail.html?id=${r.id}" class="btn btn-blue">View</a>
                        <a href="recipe-form.html?id=${r.id}" class="btn btn-green">Edit</a>
                        <button class="btn btn-red" onclick="deleteRecipe(${r.id})">Delete</button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function renderTags() {
        const allTags = [...new Set(allRecipes.flatMap(r => r.tags || []))];
        const filter = document.getElementById('tagsFilter');

        if (!allTags.length) { filter.innerHTML = ''; return; }

        filter.innerHTML = ['All', ...allTags].map(t => `
            <span class="tag ${activeTag === t || (t === 'All' && !activeTag) ? 'active' : ''}"
                  onclick="filterByTag('${t}')">${t}</span>
        `).join('');
    }

    function filterByTag(tag) {
        activeTag = tag === 'All' ? null : tag;
        loadRecipes(document.getElementById('searchInput').value);
    }

    function searchRecipes() {
        const val = document.getElementById('searchInput').value.trim();
        loadRecipes(val);
    }

    async function deleteRecipe(id) {
        if (!confirm('Delete this recipe?')) return;
        await fetch(`${API}?id=${id}`, { method: 'DELETE' });
        loadRecipes();
    }

    async function logout() {
        await fetch(`${AUTH}?action=logout`, { method: 'POST' });
        localStorage.removeItem('user');
        window.location.href = 'login.html';
    }

    loadRecipes();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Manager — Recipe Detail</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            min-height: 100vh;
        }

        nav {
            background: #2c3e50;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav h1 { color: white; font-size: 1.2rem; }
        nav a { color: #ccc; text-decoration: none; margin-left: 1rem; font-size: 0.9rem; }
        nav a:hover { color: white; }

        .container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        .recipe-image {
            width: 100%;
            height: 280px;
            object-fit: cover;
        }

        .placeholder-img {
            width: 100%;
            height: 280px;
            background: #ecf0f1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
        }

        .card-body { padding: 2rem; }

        .recipe-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .recipe-header h1 { color: #2c3e50; font-size: 1.8rem; }

        .recipe-meta {
            display: flex;
            gap: 1rem;
            color: #888;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-bottom: 1.5rem;
        }

        .tag {
            padding: 0.3rem 0.8rem;
            background: #eafaf1;
            color: #27ae60;
            border-radius: 20px;
            font-size: 0.85rem;
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 0.75rem;
            padding-bottom: 0.4rem;
            border-bottom: 2px solid #ecf0f1;
        }

        /* Scaling */
        .scaling {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            padding: 0.75rem 1rem;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .scaling label { font-weight: bold; color: #555; }

        .scaling input {
            width: 70px;
            padding: 0.4rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            text-align: center;
            font-size: 1rem;
        }

        .scaling span { color: #888; font-size: 0.9rem; }

        /* Ingredients */
        .ingredients-list {
            list-style: none;
            margin-bottom: 1.5rem;
        }

        .ingredients-list li {
            padding: 0.5rem 0;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            font-size: 0.95rem;
        }

        .ingredients-list li:last-child { border-bottom: none; }

        .ing-amount { color: #27ae60; font-weight: bold; }

        /* Instructions */
        .instructions {
            line-height: 1.8;
            color: #444;
            margin-bottom: 1.5rem;
            white-space: pre-wrap;
        }

        /* Nutrition */
        .nutrition-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .nutrition-box {
            text-align: center;
            padding: 1rem;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .nutrition-box .value {
            font-size: 1.4rem;
            font-weight: bold;
            color: #27ae60;
        }

        .nutrition-box .label {
            font-size: 0.8rem;
            color: #888;
            margin-top: 0.2rem;
        }

        .btn {
            padding: 0.6rem 1.2rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
        }

        .btn-green { background: #27ae60; color: white; }
        .btn-green:hover { background: #219a52; }
        .btn-gray { background: #95a5a6; color: white; }
        .btn-gray:hover { background: #7f8c8d; }
        .btn-red { background: #e74c3c; color: white; }
        .btn-red:hover { background: #c0392b; }

        .card-actions { display: flex; gap: 1rem; flex-wrap: wrap; }
    </style>
</head>
<body>

<nav>
    <h1>🍴 Recipe Manager</h1>
    <div>
        <a href="recipes.html">My Recipes</a>
        <a href="recipe-form.html">+ New Recipe</a>
    </div>
</nav>

<div class="container">
    <div class="card" id="recipeCard">
        <div style="padding:2rem;text-align:center;color:#888">Loading recipe...</div>
    </div>
</div>

<script>
    const API  = 'http://localhost/recipe-manager/backend/recipe.php';
    const user = JSON.parse(localStorage.getItem('user') || 'null');
    if (!user) window.location.href = 'login.html';

    const params = new URLSearchParams(window.location.search);
    const id     = params.get('id');
    if (!id) window.location.href = 'recipes.html';

    let recipe = null;

    async function loadRecipe() {
        const res = await fetch(`${API}?action=single&id=${id}`);
        recipe    = await res.json();
        renderRecipe(recipe.servings);
    }

    function renderRecipe(servings) {
        const scale = servings / recipe.servings;
        const card  = document.getElementById('recipeCard');

        card.innerHTML = `
            ${recipe.image_path
                ? `<img class="recipe-image" src="../uploads/${recipe.image_path}" alt="${recipe.title}">`
                : `<div class="placeholder-img">🍽️</div>`}
            <div class="card-body">
                <div class="recipe-header">
                    <h1>${recipe.title}</h1>
                    <div class="card-actions">
                        <a href="recipe-form.html?id=${recipe.id}" class="btn btn-green">Edit</a>
                        <button class="btn btn-red" onclick="deleteRecipe()">Delete</button>
                        <a href="recipes.html" class="btn btn-gray">← Back</a>
                    </div>
                </div>

                <div class="recipe-meta">
                    <span>🍽️ ${servings} serving${servings !== 1 ? 's' : ''}</span>
                    <span>📅 ${new Date(recipe.created_at).toLocaleDateString()}</span>
                </div>

                <div class="tags">
                    ${(recipe.tags || []).map(t => `<span class="tag">${t}</span>`).join('')}
                </div>

                ${recipe.nutrition ? `
                <div class="section-title">Nutrition per serving</div>
                <div class="nutrition-grid">
                    <div class="nutrition-box">
                        <div class="value">${Math.round(recipe.nutrition.calories * scale)}</div>
                        <div class="label">Calories</div>
                    </div>
                    <div class="nutrition-box">
                        <div class="value">${(recipe.nutrition.protein * scale).toFixed(1)}g</div>
                        <div class="label">Protein</div>
                    </div>
                    <div class="nutrition-box">
                        <div class="value">${(recipe.nutrition.fat * scale).toFixed(1)}g</div>
                        <div class="label">Fat</div>
                    </div>
                    <div class="nutrition-box">
                        <div class="value">${(recipe.nutrition.carbs * scale).toFixed(1)}g</div>
                        <div class="label">Carbs</div>
                    </div>
                </div>` : ''}

                <div class="section-title">Ingredients</div>

                <div class="scaling">
                    <label>Scale recipe:</label>
                    <input type="number" id="servingsInput" value="${servings}" min="1"
                           onchange="renderRecipe(parseInt(this.value))">
                    <span>servings (original: ${recipe.servings})</span>
                </div>

                <ul class="ingredients-list">
                    ${(recipe.ingredients || []).map(i => `
                        <li>
                            <span>${i.name}</span>
                            <span class="ing-amount">${(i.quantity * scale % 1 === 0)
                                ? i.quantity * scale
                                : (i.quantity * scale).toFixed(2)} ${i.unit}</span>
                        </li>
                    `).join('')}
                </ul>

                ${recipe.instructions ? `
                <div class="section-title">Instructions</div>
                <div class="instructions">${recipe.instructions}</div>` : ''}
            </div>
        `;
    }

    async function deleteRecipe() {
        if (!confirm('Delete this recipe?')) return;
        await fetch(`${API}?id=${id}`, { method: 'DELETE' });
        window.location.href = 'recipes.html';
    }

    loadRecipe();
</script>
</body>
</html>
